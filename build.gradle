plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.14'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

javafx {
    version = '21.0.0'
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

application {
    mainClass = 'app.Main'
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.2'
}

tasks.named('test') {
    useJUnitPlatform()
}
